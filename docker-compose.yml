services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: peo_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - /var/www/vendor
    networks:
      - peo_network
    depends_on:
      - db

  webserver:
    image: nginx:alpine
    container_name: peo_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - peo_network

  db:
    image: mysql:8.0
    container_name: peo_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: peo_document_monitoring_system
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: peo_user
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - peo_dbdata:/var/lib/mysql
    networks:
      - peo_network

networks:
  peo_network:

volumes:
  peo_dbdata:
